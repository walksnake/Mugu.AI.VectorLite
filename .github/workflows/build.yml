name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore Mugu.AI.VectorLite.slnx

    - name: Build
      run: dotnet build Mugu.AI.VectorLite.slnx --no-restore -c Release

    - name: Test
      run: dotnet test Mugu.AI.VectorLite.slnx --no-build -c Release --logger "trx;LogFileName=results.trx" --blame-hang-timeout 5min

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: '**/results.trx'

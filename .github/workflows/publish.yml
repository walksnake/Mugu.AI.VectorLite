name: Publish to NuGet

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Build
      run: dotnet build Mugu.AI.VectorLite.slnx -c Release -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Test
      run: dotnet test Mugu.AI.VectorLite.slnx --no-build -c Release

    - name: Pack
      run: dotnet pack Mugu.AI.VectorLite.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs

    - name: Push to NuGet
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_CENTER_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
